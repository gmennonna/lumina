<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lumina PWA Diagnostics v2</title>
<style>
  body { font-family: system-ui; padding: 16px; background: #f5f5f5; max-width: 600px; }
  h1 { font-size: 18px; margin-bottom: 4px; }
  .sub { font-size: 12px; color: #888; margin-bottom: 16px; }
  .card { background: white; border-radius: 10px; padding: 14px 16px; margin-bottom: 10px; border-left: 4px solid #ccc; }
  .ok { border-left-color: #4CAF50; }
  .fail { border-left-color: #f44336; }
  .warn { border-left-color: #FF9800; }
  .info { border-left-color: #2196F3; }
  .label { font-weight: 600; font-size: 14px; }
  .detail { font-size: 12px; color: #555; margin-top: 4px; word-break: break-all; }
  .btn { background: #4A3448; color: white; border: none; border-radius: 8px; padding: 14px 20px; font-size: 15px; width: 100%; margin-top: 8px; cursor: pointer; }
  .btn:disabled { background: #aaa; }
  .btn-green { background: #2e7d32; }
  #log { background: #111; color: #0f0; font-family: monospace; font-size: 11px; padding: 12px; border-radius: 8px; margin-top: 12px; white-space: pre-wrap; word-break: break-all; min-height: 80px; max-height: 400px; overflow-y: auto; }
</style>
</head>
<body>
<h1>Lumina PWA Diagnostics v2</h1>
<p class="sub">Real-time installation monitor</p>

<div id="prompt-status" class="card warn">
  <div class="label">⏳ Waiting for beforeinstallprompt...</div>
  <div class="detail">Keep this page open. Chrome may fire this event after a few seconds.</div>
</div>

<div id="results"></div>

<button class="btn btn-green" id="install-btn" onclick="triggerInstall()" disabled>
  Install Lumina (waiting for prompt...)
</button>

<button class="btn" onclick="runChecks()" style="margin-top:12px">
  Re-run Diagnostics
</button>

<div id="log"></div>

<script>
const log = document.getElementById('log');
const results = document.getElementById('results');
let deferredPrompt = null;

function addLog(msg) {
  const time = new Date().toLocaleTimeString();
  log.textContent += `[${time}] ${msg}\n`;
  log.scrollTop = log.scrollHeight;
}

function setCard(id, status, label, detail) {
  const el = document.getElementById(id);
  if (!el) return;
  el.className = `card ${status}`;
  el.innerHTML = `<div class="label">${label}</div><div class="detail">${detail}</div>`;
}

function addCard(status, label, detail) {
  const div = document.createElement('div');
  div.className = `card ${status}`;
  div.innerHTML = `<div class="label">${label}</div><div class="detail">${detail}</div>`;
  results.appendChild(div);
}

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  addLog('🎉 beforeinstallprompt FIRED!');
  setCard('prompt-status', 'ok', '✅ beforeinstallprompt received!', 'Chrome is ready to install. Tap the Install button below.');
  const btn = document.getElementById('install-btn');
  btn.disabled = false;
  btn.textContent = 'Install Lumina NOW';
});

window.addEventListener('appinstalled', () => {
  addLog('🎉 appinstalled event fired!');
  setCard('prompt-status', 'ok', '✅ App Installed!', 'Lumina was installed successfully.');
});

async function triggerInstall() {
  if (!deferredPrompt) {
    addLog('❌ No deferred prompt available');
    return;
  }
  addLog('Triggering install prompt...');
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  addLog(`User choice: ${outcome}`);
  deferredPrompt = null;
}

async function runChecks() {
  results.innerHTML = '';
  addLog('\n--- Running diagnostics ---');
  const BASE = 'https://gmennonna.github.io/lumina';

  // Chrome version
  const ua = navigator.userAgent;
  const chromeMatch = ua.match(/Chrome\/(\d+)/);
  const chromeVer = chromeMatch ? parseInt(chromeMatch[1]) : null;
  addLog(`Chrome version: ${chromeVer}`);
  addCard('info', `Chrome version: ${chromeVer || 'unknown'}`, ua.substring(0, 100));

  // Already installed?
  const isStandalone = window.matchMedia('(display-mode: standalone)').matches;
  addLog(`Running as standalone: ${isStandalone}`);
  addCard(isStandalone ? 'fail' : 'ok',
    isStandalone ? '❌ Already running as installed PWA' : '✅ Running in browser (correct)',
    isStandalone ? 'App is already installed — Chrome will NOT show install prompt again' : 'Correct context for installation');

  // SW fetch handler
  try {
    const r = await fetch(BASE + '/service-worker.js', {cache: 'no-store'});
    const text = await r.text();
    const hasFetch = text.includes("addEventListener('fetch'") || text.includes('addEventListener("fetch"');
    addLog(`SW has fetch handler: ${hasFetch}`);
    addCard(!hasFetch ? 'ok' : 'fail',
      hasFetch ? '❌ SW has empty fetch handler — blocks install' : '✅ SW has no empty fetch handler',
      text.substring(0, 120));
  } catch(e) { addLog(`SW error: ${e.message}`); }

  // Manifest
  try {
    const r = await fetch(BASE + '/manifest.json', {cache: 'no-store'});
    const json = await r.json();
    addLog(`start_url: ${json.start_url} | scope: ${json.scope}`);
    addCard('info', `Manifest OK`, `start_url: ${json.start_url} | scope: ${json.scope} | display: ${json.display}`);
  } catch(e) { addLog(`Manifest error: ${e.message}`); }

  addLog('--- Done. Now wait 30s for beforeinstallprompt... ---');
}

window.addEventListener('load', () => {
  addLog('Page loaded. Waiting for beforeinstallprompt...');
  runChecks();
});

window.addEventListener('error', e => addLog(`JS ERROR: ${e.message}`));
</script>
</body>
</html>
